<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>NYCHA & PACT Map</title>

    <!-- Local stylesheet -->
    <link rel="stylesheet" href="styles.css">

    <!-- Mapbox GL JS — both the CSS and script are required for the map to render correctly -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>
</head>

<body>
    <!-- Map renders into this container — must be empty for Mapbox to work correctly -->
    <div id="map-container"></div>

    <!-- nycha-data.js must load first so the nychaData variable is available when scripts.js runs -->
    <script src="nycha-data.js"></script>
    <script src="scripts.js"></script>
</body>

</html>
